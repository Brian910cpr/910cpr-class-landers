services:
  - type: web
    name: 910cpr-facebook-post-machine-admin
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn scripts.fb_post_machine_admin:app --bind 0.0.0.0:$PORT
    envVars:
      - key: ADMIN_TOKEN
        sync: false
      - key: FB_POST_DRY_RUN
        value: "true"
      - key: ADMIN_ALLOWED_ORIGIN
        value: "*"
      - key: META_PAGE_ID
        sync: false
      - key: META_PAGE_ACCESS_TOKEN
        sync: false
