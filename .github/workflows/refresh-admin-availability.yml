name: Refresh admin availability

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/refresh-admin-availability.yml'
      - 'scripts/build_sessions_current.py'
      - 'scripts/build_schedule_future.py'
      - 'scripts/export_calendar_snapshots.py'
      - 'scripts/build_live_availability_snapshot.py'
      - 'scripts/publish_admin_availability.py'
      - 'scripts/publish_admin_schedule.py'
      - 'scripts/import_enrollware_student_report.py'
      - 'scripts/publish_admin_reference_data.py'
      - 'scripts/block_start_time_selector.py'
      - 'scripts/build_bls_block_schedule_pilot.py'
      - 'scripts/ensure_dashboard_refresh_controls.py'
      - 'data/config/people_catalog.json'
      - 'data/config/location_resource_map.json'
      - 'data/config/travel_time_rules.json'
      - 'data/enrollware_student_snapshot.json'
      - 'data/config/block_schedule_pages.json'

permissions:
  contents: write

concurrency:
  group: refresh-admin-availability
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install python-dateutil openpyxl

      - name: Refresh Enrollware seated and committed class source
        run: python -m scripts.build_sessions_current --source enrollware_ical

      - name: Rebuild future seated schedule
        run: python -m scripts.build_schedule_future

      - name: Publish complete admin occupancy schedule
        run: python -m scripts.publish_admin_schedule

      - name: Refresh read-only calendar snapshots
        run: python -m scripts.export_calendar_snapshots

      - name: Build current live availability from calendar snapshots
        run: python -m scripts.build_live_availability_snapshot

      - name: Publish sanitized dashboard availability feed
        run: python -m scripts.publish_admin_availability

      - name: Rebuild selector availability feeds without rewriting public pages
        run: |
          python - <<'PY'
          import json
          from scripts.block_start_time_selector import (
              build_block_schedule_page,
              load_block_schedule_page_configs,
          )
          from scripts.build_bls_block_schedule_pilot import (
              apply_final_live_availability_guard,
              public_selector_availability_payload,
              selector_availability_path,
          )

          configs = load_block_schedule_page_configs()
          for page_key, page_config in configs.items():
              payload = apply_final_live_availability_guard(build_block_schedule_page(page_config))
              output = selector_availability_path(page_key)
              output.parent.mkdir(parents=True, exist_ok=True)
              output.write_text(
                  json.dumps(public_selector_availability_payload(payload), separators=(",", ":"), ensure_ascii=False) + "\n",
                  encoding="utf-8",
              )
              print(f"Published {page_key}: {payload.get('counts', {}).get('publicSelectableStartTimeCount', 0)} selectable starts -> {output}")
          PY

      - name: Publish instructor and location reference feeds
        run: python -m scripts.publish_admin_reference_data

      - name: Ensure dashboard refresh controls are present
        run: python -m scripts.ensure_dashboard_refresh_controls

      - name: Commit changed dashboard data
        run: |
          git config user.name "910CPR Availability Bot"
          git config user.email "actions@users.noreply.github.com"
          git add \
            data/runtime/calendar_snapshots \
            data/audit/enrollware_ical_import_summary.json \
            data/audit/enrollware_ical_import_report.md \
            data/audit/calendar_snapshot_export_summary.json \
            data/audit/calendar_snapshot_export_report.md \
            data/audit/live_availability_snapshot_preview.json \
            data/audit/live_availability_snapshot_report.md \
            docs/data/schedule_future.json \
            docs/data/admin_schedule.json \
            docs/data/admin_availability.json \
            docs/data/admin_people.json \
            docs/data/admin_locations.json \
            docs/data/block-selector-availability \
            docs/admin/dashboard.html \
            debug/status/build_sessions_current.json \
            debug/status/build_schedule_future.json
          if git diff --cached --quiet; then
            echo "No schedule, availability, selector, or admin reference changes to commit."
            exit 0
          fi
          git commit -m "Refresh admin schedule and live availability feeds"
          git push
