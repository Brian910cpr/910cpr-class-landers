name = "free-time-offer-worker"
main = "worker/free-time-offer-worker.js"
compatibility_date = "2026-06-05"
workers_dev = true

# Cloudflare DNS requirement:
# schedule.910cpr.com must exist in the 910cpr.com zone as a proxied DNS record.
# Keep offer_click_target.enabled=false in the static site until this route is verified.
routes = [
  { pattern = "schedule.910cpr.com/*", zone_name = "910cpr.com" }
]

[vars]
CREATION_ENABLED = "false"
DRY_RUN = "true"
ALLOW_PUBLIC_CREATION = "false"
